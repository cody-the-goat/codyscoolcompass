<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass Controller</title>
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #13131a;
    --border:   #2a2a3a;
    --accent:   #00e5ff;
    --accent2:  #ffd600;
    --text:     #e8eaf0;
    --muted:    #5a5a7a;
    --connected:#00e5a0;
    --radius:   14px;
    --font:     'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font); min-height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; padding: 24px 16px 40px; gap: 20px;
  }
  header { text-align: center; }
  header h1 { font-size: 1.1rem; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; }
  header p  { font-size: 0.7rem; color: var(--muted); margin-top: 4px; letter-spacing: 0.1em; }

  #status-bar {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; padding: 8px 18px;
    font-size: 0.75rem; letter-spacing: 0.08em;
  }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  #status-dot.on  { background: var(--connected); box-shadow: 0 0 8px var(--connected); }
  #status-dot.err { background: #ff4444; }
  #status-text { color: var(--muted); }

  #btn-connect {
    background: transparent; border: 1.5px solid var(--accent);
    color: var(--accent); font-family: var(--font); font-size: 0.8rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 12px 28px; border-radius: 999px; cursor: pointer;
    transition: background 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #btn-connect:active { background: var(--accent); color: var(--bg); }

  /* live compass display */
  .compass-live {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  #heading-deg {
    font-size: 3.5rem; color: var(--accent); letter-spacing: 0.05em; line-height: 1;
  }
  #heading-dir {
    font-size: 1.4rem; color: var(--accent2); letter-spacing: 0.2em;
  }
  #heading-label {
    font-size: 0.65rem; color: var(--muted); letter-spacing: 0.15em;
  }

  /* animated compass needle */
  .needle-wrap {
    width: 180px; height: 180px; position: relative;
  }
  #needle-svg {
    width: 100%; height: 100%;
    transition: transform 0.2s ease-out;
  }

  /* mode toggle */
  .mode-row {
    display: flex; gap: 10px;
  }
  .mode-btn {
    background: var(--surface); border: 1.5px solid var(--border);
    color: var(--muted); font-family: var(--font); font-size: 0.7rem;
    letter-spacing: 0.1em; padding: 8px 16px; border-radius: 999px;
    cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .mode-btn.active {
    border-color: var(--accent2); color: var(--accent2);
  }

  /* nav box */
  .nav-box {
    width: 100%; max-width: 360px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .nav-box label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; }
  .nav-box.active-mode { border-color: var(--accent2); }
  .nav-box.active-mode label { color: var(--accent2); }
  .nav-row { display: flex; gap: 8px; }
  #place-input {
    flex: 1; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: var(--font); font-size: 0.85rem;
    padding: 10px 12px; outline: none;
  }
  #place-input:focus { border-color: var(--accent2); }
  #place-input::placeholder { color: var(--muted); }
  #btn-nav {
    background: var(--accent2); color: var(--bg); border: none;
    border-radius: 8px; font-family: var(--font); font-size: 0.75rem;
    font-weight: bold; letter-spacing: 0.1em; padding: 10px 14px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s; white-space: nowrap;
  }
  #btn-nav:active { opacity: 0.7; }
  #nav-status { font-size: 0.7rem; color: var(--muted); min-height: 1.2em; text-align: center; }
  #nav-status.ok  { color: var(--connected); }
  #nav-status.err { color: #ff4444; }

  #last-sent { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; }
  #last-sent span { color: var(--accent); }

  #btn-start-compass {
    background: var(--accent); color: var(--bg); border: none;
    border-radius: 999px; font-family: var(--font); font-size: 0.8rem;
    font-weight: bold; letter-spacing: 0.15em; padding: 14px 32px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  #btn-start-compass:active { opacity: 0.7; }

  .note {
    font-size: 0.65rem; color: var(--muted); text-align: center;
    max-width: 300px; line-height: 1.6; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: var(--radius);
  }
  .note a { color: var(--accent); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <h1>⬆ Compass</h1>
  <p>BLE → ESP32 Matrix Controller</p>
</header>

<div id="status-bar">
  <div id="status-dot"></div>
  <span id="status-text">NOT CONNECTED</span>
</div>

<button id="btn-connect">Connect to ESP32</button>

<!-- Mode toggle -->
<div class="mode-row">
  <button class="mode-btn active" id="btn-mode-live">📱 Live Heading</button>
  <button class="mode-btn" id="btn-mode-nav">🗺 Navigate To</button>
</div>

<!-- Live compass display -->
<div class="compass-live">
  <div class="needle-wrap">
    <svg id="needle-svg" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
      <!-- ring -->
      <circle cx="90" cy="90" r="85" fill="none" stroke="#2a2a3a" stroke-width="1.5"/>
      <circle cx="90" cy="90" r="60" fill="none" stroke="#1e1e2e" stroke-width="1" stroke-dasharray="3 5"/>
      <!-- cardinal ticks -->
      <g stroke="#3a3a5a" stroke-width="1.5">
        <line x1="90" y1="5"   x2="90" y2="18"/>
        <line x1="90" y1="162" x2="90" y2="175"/>
        <line x1="5"  y1="90"  x2="18" y2="90"/>
        <line x1="162" y1="90" x2="175" y2="90"/>
      </g>
      <!-- N label -->
      <text x="90" y="32" text-anchor="middle" fill="#00e5ff" font-size="12" font-family="Courier New">N</text>
      <text x="90" y="158" text-anchor="middle" fill="#5a5a7a" font-size="10" font-family="Courier New">S</text>
      <text x="158" y="94" text-anchor="middle" fill="#5a5a7a" font-size="10" font-family="Courier New">E</text>
      <text x="22"  y="94" text-anchor="middle" fill="#5a5a7a" font-size="10" font-family="Courier New">W</text>
      <!-- Needle: red = north, grey = south -->
      <g id="needle" transform="rotate(0, 90, 90)">
        <polygon points="90,20 84,90 96,90" fill="#00e5ff"/>
        <polygon points="90,160 84,90 96,90" fill="#2a2a3a"/>
        <circle cx="90" cy="90" r="5" fill="#13131a" stroke="#5a5a7a" stroke-width="1.5"/>
      </g>
    </svg>
  </div>
  <div id="heading-deg">—°</div>
  <div id="heading-dir">—</div>
  <div id="heading-label">PHONE HEADING</div>
</div>

<button id="btn-start-compass">Start Live Compass</button>
<button id="btn-calibrate" style="display:none;background:transparent;border:1.5px solid var(--accent2);color:var(--accent2);font-family:var(--font);font-size:0.75rem;letter-spacing:0.12em;padding:10px 22px;border-radius:999px;cursor:pointer;" >⬆ POINT NORTH &amp; TAP TO CALIBRATE</button>

<!-- Nav box (hidden by default) -->
<div class="nav-box" id="nav-box" style="display:none">
  <label>NAVIGATE TO</label>
  <div class="nav-row">
    <input id="place-input" type="text" placeholder="e.g. Eiffel Tower, Paris">
    <button id="btn-nav">GO</button>
  </div>
  <div id="nav-status">Type a place and hit GO</div>
</div>

<div id="last-sent">—</div>
<div id="nav-debug" style="font-size:0.65rem;color:var(--accent2);letter-spacing:0.05em;text-align:center;min-height:1em;max-width:340px;word-break:break-all"></div>

<!-- Calibration -->
<div class="nav-box" style="max-width:360px;width:100%">
  <label>CALIBRATION OFFSET</label>
  <div style="display:flex;align-items:center;gap:12px;">
    <input id="offset-slider" type="range" min="-180" max="180" value="0"
      style="flex:1;accent-color:var(--accent2);">
    <span id="offset-val" style="color:var(--accent2);font-size:0.9rem;min-width:40px;text-align:right">0°</span>
  </div>
  <div style="font-size:0.65rem;color:var(--muted);text-align:center">
    Face a known direction, adjust until the display matches
  </div>
</div>

<div class="note">
  ⚠ Web BLE + compass requires <strong>Bluefy on iOS</strong>.<br>
  <a href="https://apps.apple.com/app/bluefy/id1492822055" target="_blank">Get Bluefy →</a>
</div>

<script>
  const SERVICE_UUID        = '12345678-1234-1234-1234-123456789abc';
  const CHARACTERISTIC_UUID = 'abcd1234-ab12-ab12-ab12-abcdef012345';

  let bleDevice = null, bleChar = null;
  let watchingCompass = false;
  let currentMode = 'live'; // 'live' or 'nav'
  let navBearing  = null;
  let lastSentDir = '';
  let lastHeading = 0;

  const btnConnect      = document.getElementById('btn-connect');
  const statusDot       = document.getElementById('status-dot');
  const statusText      = document.getElementById('status-text');
  const lastSentEl      = document.getElementById('last-sent');
  const headingDeg      = document.getElementById('heading-deg');
  const headingDir      = document.getElementById('heading-dir');
  const needle          = document.getElementById('needle');
  const btnStartCompass = document.getElementById('btn-start-compass');
  const btnCalibrate    = document.getElementById('btn-calibrate');
  const btnModeLive     = document.getElementById('btn-mode-live');
  const btnModeNav      = document.getElementById('btn-mode-nav');
  const navBox          = document.getElementById('nav-box');
  const placeInput      = document.getElementById('place-input');
  const btnNav          = document.getElementById('btn-nav');
  const navStatus       = document.getElementById('nav-status');

  // ── BLE ──────────────────────────────────────────────────
  function setStatus(state, msg) {
    statusDot.className = state;
    statusText.textContent = msg;
  }

  async function connect() {
    if (!navigator.bluetooth) {
      setStatus('err', 'WEB BLE NOT SUPPORTED');
      alert('Use Bluefy on iOS or Chrome on Android.');
      return;
    }
    try {
      setStatus('', 'SCANNING...');
      bleDevice = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'ESP32-Compass' }],
        optionalServices: [SERVICE_UUID]
      });
      bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
      const server  = await bleDevice.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      bleChar       = await service.getCharacteristic(CHARACTERISTIC_UUID);
      setStatus('on', 'CONNECTED');
      btnConnect.textContent = 'Disconnect';
    } catch (err) {
      setStatus('err', 'FAILED');
      console.error(err);
    }
  }

  function onDisconnected() {
    bleChar = null;
    setStatus('', 'DISCONNECTED');
    btnConnect.textContent = 'Connect to ESP32';
  }

  btnConnect.addEventListener('click', () => {
    if (bleChar) bleDevice.gatt.disconnect(); else connect();
  });

  // Throttle BLE sends — only send when direction changes
  async function sendDir(dir) {
    if (!bleChar || dir === lastSentDir) return;
    try {
      await bleChar.writeValueWithoutResponse(new TextEncoder().encode(dir));
      lastSentDir = dir;
      lastSentEl.innerHTML = `SENT: <span>${dir}</span>`;
    } catch (err) { console.error('BLE send failed:', err); }
  }

  // ── Heading utils ────────────────────────────────────────
  function degToDir(deg) {
    const dirs = ['N','NE','E','SE','S','SW','W','NW'];
    return dirs[Math.round(deg / 45) % 8];
  }

  let calibOffset = 0;

  function updateDisplay(heading) {
    lastHeading = heading;
    const adjusted = ((heading + calibOffset) + 360) % 360;
    const rounded  = Math.round(adjusted);
    const dir = degToDir(rounded);
    headingDeg.textContent = `${rounded}°`;
    headingDir.textContent = dir;
    needle.setAttribute('transform', `rotate(${rounded}, 90, 90)`);
    if (offsetVal) offsetVal.textContent = `${calibOffset > 0 ? '+' : ''}${calibOffset}°`;

    if (currentMode === 'live') {
      sendDir(String(rounded));
    } else if (currentMode === 'nav' && navBearing !== null) {
      let rel = ((navBearing - adjusted) + 360) % 360;
      const dirs = ['N','NE','E','SE','S','SW','W','NW'];
      const relDir = dirs[Math.round(rel / 45) % 8];
      // show debug info on screen
      const dbg = document.getElementById('nav-debug');
      if (dbg) dbg.textContent = `navBearing:${Math.round(navBearing)}° phone:${Math.round(adjusted)}° rel:${Math.round(rel)}° → ${relDir}`;
      sendDir(relDir);
    }
  }

  // ── Device orientation (compass) ─────────────────────────
  function startCompass() {
    if (watchingCompass) return;

    // iOS 13+ requires permission
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then(state => {
          if (state === 'granted') attachOrientation();
          else alert('Motion permission denied — compass won\'t work.');
        })
        .catch(console.error);
    } else {
      attachOrientation();
    }
  }

  function attachOrientation() {
    window.addEventListener('deviceorientationabsolute', onOrientation, true);
    window.addEventListener('deviceorientation', onOrientation, true);
    watchingCompass = true;
    btnStartCompass.textContent = 'Compass Active ✓';
    btnStartCompass.style.background = 'var(--connected)';
    btnCalibrate.style.display = 'inline-block';
  }

  function onOrientation(e) {
    let heading = null;

    if (e.webkitCompassHeading != null && e.webkitCompassHeading !== 0) {
      // iOS true north — most accurate, use this if available
      heading = e.webkitCompassHeading;
    } else if (e.absolute && e.alpha != null) {
      // Android absolute orientation
      heading = (360 - e.alpha) % 360;
    }
    // ignore non-absolute alpha — it drifts relative to page load


    if (heading !== null) updateDisplay(heading);
  }

  btnStartCompass.addEventListener('click', startCompass);

  // Point-north calibration: whatever the phone reports right now SHOULD be 0°
  btnCalibrate.addEventListener('click', () => {
    calibOffset = (-(lastHeading) + 360) % 360;
    // normalize to -180..180 for display
    if (calibOffset > 180) calibOffset -= 360;
    if (offsetVal) offsetVal.textContent = `${calibOffset > 0 ? '+' : ''}${Math.round(calibOffset)}°`;
    if (offsetSlider) offsetSlider.value = Math.round(calibOffset);
    updateDisplay(lastHeading);
    btnCalibrate.textContent = '✓ CALIBRATED';
    btnCalibrate.style.borderColor = 'var(--connected)';
    btnCalibrate.style.color = 'var(--connected)';
    setTimeout(() => {
      btnCalibrate.textContent = '⬆ POINT NORTH & TAP TO CALIBRATE';
      btnCalibrate.style.borderColor = 'var(--accent2)';
      btnCalibrate.style.color = 'var(--accent2)';
    }, 2000);
  });

  // ── Mode toggle ──────────────────────────────────────────
  btnModeLive.addEventListener('click', () => {
    currentMode = 'live';
    btnModeLive.classList.add('active');
    btnModeNav.classList.remove('active');
    navBox.style.display = 'none';
    navBearing = null;
    navStatus.textContent = 'Type a place and hit GO';
    navStatus.className = '';
  });

  btnModeNav.addEventListener('click', () => {
    currentMode = 'nav';
    btnModeNav.classList.add('active');
    btnModeLive.classList.remove('active');
    navBox.style.display = 'flex';
  });

  // ── Navigation ───────────────────────────────────────────
  function calcBearing(lat1, lon1, lat2, lon2) {
    const toRad = d => d * Math.PI / 180;
    const dLon  = toRad(lon2 - lon1);
    const y = Math.sin(dLon) * Math.cos(toRad(lat2));
    const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2))
            - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
    return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
  }

  async function navigate() {
    const place = placeInput.value.trim();
    if (!place) return;
    navStatus.className = '';
    navStatus.textContent = 'Getting your location...';

    let userPos;
    try {
      userPos = await new Promise((res, rej) =>
        navigator.geolocation.getCurrentPosition(res, rej, { timeout: 8000 })
      );
    } catch {
      navStatus.className = 'err';
      navStatus.textContent = 'Location denied — enable it and retry.';
      return;
    }

    navStatus.textContent = `Searching "${place}"...`;
    try {
      const lat  = userPos.coords.latitude;
      const lon  = userPos.coords.longitude;
      // bias results to within ~50km of user, sorted by closest
      const url  = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(place)}&format=json&limit=1&lat=${lat}&lon=${lon}&bounded=0`;
      const res  = await fetch(url, { headers: { 'Accept-Language': 'en' } });
      const data = await res.json();
      if (!data.length) throw new Error('Not found');
      const destLat  = parseFloat(data[0].lat);
      const destLon  = parseFloat(data[0].lon);
      const destName = data[0].display_name; // full address
      navBearing = calcBearing(lat, lon, destLat, destLon);
      navStatus.className = 'ok';
      navStatus.textContent = `→ ${destName}`;
    } catch {
      navStatus.className = 'err';
      navStatus.textContent = `Can't find "${place}" — be more specific.`;
    }
  }

  btnNav.addEventListener('click', navigate);
  placeInput.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(); });

  // Calibration
  const offsetSlider = document.getElementById('offset-slider');
  const offsetVal    = document.getElementById('offset-val');
  offsetSlider.addEventListener('input', () => {
    calibOffset = parseInt(offsetSlider.value);
    offsetVal.textContent = `${calibOffset > 0 ? '+' : ''}${calibOffset}°`;
    updateDisplay(lastHeading);
  });
</script>
</body>
</html>
